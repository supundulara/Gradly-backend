name: CD — Build & Deploy to EC2

on:
  push:
    branches:
      - master        # deploy on every push/merge to master
  pull_request:
    branches:
      - master        # run build+test on PRs targeting master (no deploy)
    types: [opened, synchronize, reopened]

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & test every service with Maven
  # ──────────────────────────────────────────────
  build:
    name: Build & Test all services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build service-discovery
        run: mvn -f service-discovery/pom.xml clean package -DskipTests

      - name: Build gateway-service
        run: mvn -f gateway-service/pom.xml clean package -DskipTests

      - name: Build user-service
        run: mvn -f user-service/pom.xml clean package -DskipTests

      - name: Build post-service
        run: mvn -f post-service/pom.xml clean package -DskipTests

      - name: Build opportunity-service
        run: mvn -f opportunity-service/pom.xml clean package -DskipTests

      - name: Build notification-service
        run: mvn -f notification-service/pom.xml clean package -DskipTests

      - name: Build messaging-service
        run: mvn -f messaging-service/pom.xml clean package -DskipTests

  # ──────────────────────────────────────────────
  # 2. Deploy to EC2 — only on pushes to main
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build                      # wait for build job to pass
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Write the SSH private key to a temp file ──
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ── Copy repo to EC2 ──
      - name: Sync project to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '**/target/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/Gradly-backend/

      # ── Write the .env file on EC2 from GitHub Secrets ──
      - name: Write .env on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cat > /home/${{ secrets.EC2_USER }}/Gradly-backend/.env << ENVEOF
          USER_DB_URI=${{ secrets.USER_DB_URI }}
          POST_DB_URI=${{ secrets.POST_DB_URI }}
          OPPORTUNITY_DB_URI=${{ secrets.OPPORTUNITY_DB_URI }}
          MESSAGE_DB_URI=${{ secrets.MESSAGE_DB_URI }}
          NOTIFICATION_DB_URI=${{ secrets.NOTIFICATION_DB_URI }}
          ANALYTICS_DB_URI=${{ secrets.ANALYTICS_DB_URI }}
          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          EUREKA_URI=http://service-discovery:8761/eureka
          ENVEOF"

      # ── SSH into EC2 and bring up Docker Compose ──
      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            cd /home/${{ secrets.EC2_USER }}/Gradly-backend

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
            fi

            # Pull + build images and restart all services
            # Remove ALL existing containers (running or stopped)
            sudo docker rm -f $(sudo docker ps -aq) 2>/dev/null || true
            
            # Start services
            sudo docker-compose up -d --build
            
            # Clean unused images
            sudo docker image prune -f
            
            # Show running containers
            sudo docker ps
          EOF

