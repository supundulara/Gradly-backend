server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**

            - id: post-service
              uri: lb://POST-SERVICE
              predicates:
                - Path=/posts/**

            - id: opportunity-service
              uri: lb://OPPORTUNITY-SERVICE
              predicates:
                - Path=/jobs/**,/events/**

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications/**

            - id: messaging-service
              uri: lb://MESSAGING-SERVICE
              predicates:
                - Path=/conversations/**

            - id: messaging-service-ws
              uri: lb:ws://MESSAGING-SERVICE
              predicates:
                - Path=/ws/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
